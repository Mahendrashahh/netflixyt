<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching</title>
    <link rel="stylesheet" href="watching.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Who's watching?</h1>

        <div class="profiles">

            <div class="profile" onclick="selectProfile('frontendbuddy')">
                <div class="avatar">
                    <img
                        src="https://images.unsplash.com/photo-1761839257349-037aea1d94de?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxfHx8ZW58MHx8fHx8">
                </div>
                <div class="name">frontendbuddy</div>
            </div>

            <div class="profile" onclick="selectProfile('frontendbuddy')">
                <div class="avatar">
                    <img
                        src="https://images.unsplash.com/photo-1761839257349-037aea1d94de?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxfHx8ZW58MHx8fHx8">
                </div>
                <div class="name">frontendbuddy</div>
            </div>


            <div class="profile">

                <div class=" avatar add-profile">
                    +
                </div>
                <div class="name">Add Profile</div>
            </div>


            <div class="manage">
                <button>Manage Profiles</button>
            </div>

        </div>

    <script>
        function selectProfile(profileName) {
            // Store the selected profile name in localStorage
            localStorage.setItem('selectedProfile', profileName);
            
            // Navigate to nt.html
            window.location.href = 'nt.html';
        }

        // Add click handler for Add Profile button
        document.querySelector('.add-profile').addEventListener('click', function() {
            // For now, just navigate to nt.html
            // In a real app, this would open a profile creation modal
            window.location.href = 'nt.html';
        });

        // Add click handler for Manage Profiles button
        document.querySelector('.manage button').addEventListener('click', function() {
            // For now, just navigate to nt.html
            // In a real app, this would open profile management
            window.location.href = 'nt.html';
        });
    </script>
</body>

</html>
